name: API Gateway CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: happy-paws-org/happy-paws-platform/.github/workflows/python-ci.yaml@develop
    with:
      service_name: api-gateway
      python_version: "3.11"
      dockerfile: Dockerfile
    secrets: inherit